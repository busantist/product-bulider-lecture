<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vibe Lotto</title>
    <meta name="google-adsense-account" content="ca-pub-5285991878457659" />
    <script
      async
      src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5285991878457659"
      crossorigin="anonymous"
    ></script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="wrap">
      <div class="topbar">
        <div>
          <h1>🎲 Vibe Lotto</h1>
          <p class="sub">버튼 한 번으로 로또 번호 5세트를 만들어줘요.</p>
        </div>
        <button id="themeToggle" class="btn ghost sm" type="button">화이트모드</button>
      </div>

      <section class="card">
        <div class="row">
          <button id="btn" class="btn">번호 5세트 생성</button>
          <button id="copy" class="btn ghost" disabled>결과 복사</button>
        </div>

        <div class="options">
          <label class="chk">
            <input id="excludeRecent" type="checkbox" />
            최근 2회차 당첨번호 제외(입력했을 때만 적용)
          </label>
        </div>

        <div id="recentBox" class="recentBox hidden">
          <p class="hint">
            최근 2회차 당첨번호(보너스 제외)를 <b>쉼표</b>로 입력해줘요. 예: <code>3,7,15,16,19,43</code>
          </p>
          <textarea
            id="recentInput"
            rows="2"
            placeholder="예: 3,7,15,16,19,43 | 1,9,12,22,33,40"
          ></textarea>
          <p class="hint small">두 회차는 <b>|</b> 로 구분해도 되고, 줄바꿈으로 구분해도 돼요.</p>
        </div>

        <div id="result" class="result empty">여기에 결과가 나와요.</div>
      </section>

      <section class="card">
        <h2 class="cardTitle">제휴 문의</h2>
        <p class="sub">간단히 남겨주시면 확인 후 연락드릴게요.</p>
        <form class="form" action="https://formspree.io/f/xkovqqrv" method="POST">
          <label class="field">
            <span>이름</span>
            <input type="text" name="name" placeholder="홍길동" required />
          </label>
          <label class="field">
            <span>이메일</span>
            <input type="email" name="email" placeholder="name@example.com" required />
          </label>
          <label class="field">
            <span>문의 내용</span>
            <textarea name="message" rows="5" placeholder="제휴 제안 내용을 적어주세요." required></textarea>
          </label>
          <button class="btn" type="submit">문의 보내기</button>
        </form>
      </section>

      <section class="card">
        <h2 class="cardTitle">댓글</h2>
        <div id="disqus_thread"></div>
        <script>
          /**
           *  RECOMMENDED CONFIGURATION VARIABLES: EDIT AND UNCOMMENT THE SECTION BELOW TO INSERT DYNAMIC VALUES FROM YOUR PLATFORM OR CMS.
           *  LEARN WHY DEFINING THESE VARIABLES IS IMPORTANT: https://disqus.com/admin/universalcode/#configuration-variables    */
          /*
          var disqus_config = function () {
          this.page.url = PAGE_URL;  // Replace PAGE_URL with your page's canonical URL variable
          this.page.identifier = PAGE_IDENTIFIER; // Replace PAGE_IDENTIFIER with your page's unique identifier variable
          };
          */
          (function() { // DON'T EDIT BELOW THIS LINE
          var d = document, s = d.createElement('script');
          s.src = 'https://productbuilder-hx5n7savak.disqus.com/embed.js';
          s.setAttribute('data-timestamp', +new Date());
          (d.head || d.body).appendChild(s);
          })();
        </script>
        <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
      </section>

      <footer class="footer">
        <span>Tip: 번호는 완전 랜덤(중복 없이)으로 뽑아요.</span>
      </footer>
    </main>

    <script src="script.js"></script>
  </body>
</html>
